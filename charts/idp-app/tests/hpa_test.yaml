suite: hpa
templates:
  - hpa.yaml
values:
  - values/minimum.yaml
tests:
  - it: should match snapshot with values-ci.yaml
    values:
      - ../values-ci.yaml
    asserts:
      - matchSnapshot: {}

  - it: when multi deployment
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
      - values/multi.yaml

    asserts:
      - matchSnapshot: {}
      - equal:
          path: metadata.name
          value: RELEASE-NAME-one
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-two
        documentIndex: 1
  - it: when default values are used
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
    asserts:
      - isSubset:
          path: spec.behavior
          content:
            scaleDown:
              policies:
                - periodSeconds: 60
                  type: Percent
                  value: 5
              stabilizationWindowSeconds: 600
            scaleUp:
              policies:
                - periodSeconds: 60
                  type: Percent
                  value: 5
                - periodSeconds: 60
                  type: Pods
                  value: 1
              selectPolicy: Max
              stabilizationWindowSeconds: 0

  - it: when scaleDown is disabled
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
    set:
      autoscaling:
        scaleDown:
          preset: Disabled
    asserts:
      - isSubset:
          path: spec.behavior.scaleDown
          content:
            selectPolicy: Disabled

  - it: when scaleDown preset is unknown, fail
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
    set:
      autoscaling:
        scaleDown:
          preset: Unknown
    asserts:
      - failedTemplate:
          errorMessage: "autoscaling.scaleDown.preset 'Unknown' not defined in global.idpAppConfig.defaults.autoscaling.presets.scaleDown"

  - it: can override scaleDown stabilizationWindowSeconds on top of Lean preset
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
    set:
      autoscaling:
        scaleDown:
          stabilizationWindowSeconds: 1200
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 1200
      - isSubset:
          path: spec.behavior.scaleDown
          content:
            policies:
              - type: Percent
                value: 5
                periodSeconds: 60

  - it: when deployment.kind is StatefulSet
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
      - values/statefulset.yaml
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: StatefulSet

  - it: when scaleDown and scaleUp set directly without preset
    values:
      - values/deployment.yaml
      - values/autoscaling.yaml
    set:
      autoscaling:
        scaleDown:
          preset: ""
          stabilizationWindowSeconds: 300
        scaleUp:
          preset: ""
          stabilizationWindowSeconds: 30
          selectPolicy: Max
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300
      - equal:
          path: spec.behavior.scaleUp.stabilizationWindowSeconds
          value: 30
      - equal:
          path: spec.behavior.scaleUp.selectPolicy
          value: Max


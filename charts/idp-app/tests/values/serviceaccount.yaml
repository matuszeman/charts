appName: app-name
appVersion: 0.1.0

serviceAccount:
  create: true
  awsRoleArn: arn:aws:iam::123456789012:role/test-role
  rbac:
    roles:
      configmap-reader:
        rules:
          - apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "list", "watch"]
    clusterRoles:
      node-reader:
        rules:
          - apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "list"]
    clusterRoleBindings:
      view-binding:
        clusterRoleName: view
    roleBindings:
      existing-clusterrole-ns:
        clusterRoleName: edit
      existing-role:
        roleName: some-existing-role

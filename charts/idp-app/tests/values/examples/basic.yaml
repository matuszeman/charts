appName: my-app
appVersion: "1.0.0"

deployment:
  enabled: true

service:
  enabled: true
  port: 80

containers:
  app:
    image: my-app
    imageTag: "1.0.0"
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

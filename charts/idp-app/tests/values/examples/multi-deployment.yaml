# Example: Multiple deployments from one release
# Snapshot: https://github.com/matuszeman/charts/blob/main/charts/idp-app/tests/__snapshot__/example-multi-deployment_test.yaml.snap
# deployment.multi creates several Deployments (or StatefulSets) from a single
# Helm release. Each key becomes a name suffix. The containers map at the multi
# level is deep-merged over the top-level containers, so shared config is
# written once and each workload only specifies what differs.

appName: my-app
appVersion: "1.0.0"

deployment:
  enabled: true
  multi:
    api:
      {}              # inherits top-level containers as-is

    worker:
      containers:
        app:
          command: ["worker", "--queue=default"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi

    scheduler:
      containers:
        app:
          command: ["scheduler"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi

service:
  enabled: true
  port: 80

# __DEPLOYMENT_ID__ is replaced with the deployment key for each entry in
# deployment.multi, producing one HTTPRoute per deployment:
#   api.example.com, worker.example.com, scheduler.example.com
httpRoutes:
  public:
    enabled: true
    gatewayName: http-public
    domain: example.com
    host: __DEPLOYMENT_ID__
    path: /

# ---------------------------------------------------------------------------
# Shared container spec — inherited by all entries in deployment.multi
# ---------------------------------------------------------------------------

containers:
  app:
    image: my-app
    imageTag: "1.0.0"
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      APP_ENV: production
    livenessProbe:
      httpGet:
        path: /healthz
        port: app

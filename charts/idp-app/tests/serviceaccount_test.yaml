suite: serviceaccount
templates:
  - serviceaccount.yaml
  - serviceaccount-rbac.yaml
values:
  - values/minimum.yaml
tests:
  - it: should match snapshot with values-ci.yaml
    values:
      - ../values-ci.yaml
    asserts:
      - matchSnapshot: {}
  - it: when name is not set, then default to release name
    values:
      - values/serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        template: serviceaccount.yaml
  - it: when name is set
    values:
      - values/serviceaccount.yaml
    set:
      serviceAccount:
        name: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-name
        template: serviceaccount.yaml

  # RBAC
  - it: rbac should produce no documents when serviceAccount.create is false and name is not set
    asserts:
      - hasDocuments:
          count: 0
        template: serviceaccount-rbac.yaml

  - it: rbac should produce no documents when debug is true
    set:
      debug: true
      serviceAccount:
        create: true
        rbac:
          roles:
            r1:
              rules:
                - apiGroups: [""]
                  resources: ["pods"]
                  verbs: ["get"]
    asserts:
      - hasDocuments:
          count: 0
        template: serviceaccount-rbac.yaml

  - it: rbac should produce no documents when serviceAccount has name but rbac is empty
    set:
      serviceAccount:
        name: existing-sa
    asserts:
      - hasDocuments:
          count: 0
        template: serviceaccount-rbac.yaml

  - it: rbac should render when serviceAccount.create is false but name is set
    set:
      serviceAccount:
        name: existing-sa
        rbac:
          clusterRoleBindings:
            view-binding:
              clusterRoleName: view
    asserts:
      - hasDocuments:
          count: 1
        template: serviceaccount-rbac.yaml

  - it: rbac should match snapshot with full rbac values
    values:
      - values/serviceaccount.yaml
    asserts:
      - matchSnapshot: {}
        template: serviceaccount-rbac.yaml
{{- if not .Values.debug -}}
{{- if or .Values.serviceAccount.create .Values.serviceAccount.name -}}
{{- $rbac := .Values.serviceAccount.rbac | default dict -}}

{{- range $roleKey, $roleSpec := ($rbac.roles | default dict) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $roleKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
rules:
  {{- toYaml (required (printf "serviceAccount.rbac.roles.%s.rules is required" $roleKey) $roleSpec.rules) | nindent 2 }}
{{- end }}

{{- range $crKey, $crSpec := ($rbac.clusterRoles | default dict) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $crKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
rules:
  {{- toYaml (required (printf "serviceAccount.rbac.clusterRoles.%s.rules is required" $crKey) $crSpec.rules) | nindent 2 }}
{{- end }}

{{- range $roleKey, $roleSpec := ($rbac.roles | default dict) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $roleKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "idp-app.fullname" $ }}-{{ $roleKey }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idp-app.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- range $bindingKey, $bindingSpec := ($rbac.roleBindings | default dict) }}
{{- if and $bindingSpec.roleName $bindingSpec.clusterRoleName }}
  {{- fail (printf "serviceAccount.rbac.roleBindings.%s: only one of roleName or clusterRoleName may be set" $bindingKey) }}
{{- end }}
{{- if and (not $bindingSpec.roleName) (not $bindingSpec.clusterRoleName) }}
  {{- fail (printf "serviceAccount.rbac.roleBindings.%s: roleName or clusterRoleName is required" $bindingKey) }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $bindingKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if $bindingSpec.roleName }}
  kind: Role
  name: {{ $bindingSpec.roleName }}
  {{- else }}
  kind: ClusterRole
  name: {{ $bindingSpec.clusterRoleName }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idp-app.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- range $crKey, $crSpec := ($rbac.clusterRoles | default dict) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $crKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "idp-app.fullname" $ }}-{{ $crKey }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idp-app.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- range $bindingKey, $bindingSpec := ($rbac.clusterRoleBindings | default dict) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "idp-app.fullname" $ }}-{{ $bindingKey }}
  labels:
    {{- include "idp-app.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ required (printf "serviceAccount.rbac.clusterRoleBindings.%s.clusterRoleName is required" $bindingKey) $bindingSpec.clusterRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idp-app.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{- end }}
{{- end }}

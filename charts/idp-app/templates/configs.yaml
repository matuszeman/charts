{{- if not .Values.debug -}}
{{- if not (empty .Values.configs) }}
{{- $defaultsConfigsAnnotations := ((((.Values.global).idpAppConfig).defaults).configs).annotations | default (dict) }}
{{- $defaultsConfigsExternalSecret := ((((.Values.global).idpAppConfig).defaults).configs).externalSecret | default (dict) }}
{{- $secretStore := false }}
{{- range $configKey, $configSpec := .Values.configs }}
{{- $mergedLabels := merge (dict) (include "idp-app.labels" $ | fromYaml) (default $configSpec.labels dict) }}
{{- $mergedAnnotations := merge (dict) $defaultsConfigsAnnotations (default $configSpec.annotations dict) }}
{{- if or .fromSecret .fromConfigMap .fromFolder }}
{{- else if .sealedSecret }}
{{- with .sealedSecret }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "idp-app.configName" (list $ $configKey) }}
  {{- $annotations := $mergedAnnotations }}
  {{- if .scope }}
  {{- $annotations = merge $annotations (dict (printf "sealedsecrets.bitnami.com/%s" .scope ) "true")}}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- toYaml $mergedLabels | nindent 4 }}
spec:
  encryptedData:
    {{- toYaml (required ".sealedSecret.encryptedData required" .encryptedData) | nindent 4 }}
  template:
    metadata:
      name: {{ include "idp-app.configName" (list $ $configKey) }}
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- toYaml $mergedLabels | nindent 8 }}
{{- end }}
{{- else if .awsSecret }}
{{- $secretStore = true }}
{{- with .awsSecret }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "idp-app.configName" (list $ $configKey) }}
  labels:
    {{- toYaml $mergedLabels | nindent 4 }}
  {{- $externalAnnotations := merge (dict) $mergedAnnotations (dict "values-hash" $configSpec.valuesHash) }}
  {{- with $externalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ default (required "defaults.configs.externalSecret.refreshInterval required" (get $defaultsConfigsExternalSecret "refreshInterval")) .refreshInterval | quote }}
  secretStoreRef:
    name: {{ include "idp-app.fullname" $ }}-config-secretsmanager
    kind: SecretStore
  target:
    name: {{ include "idp-app.configName" (list $ $configKey) }}
    creationPolicy: Owner
    template:
      engineVersion: "v2"
      metadata:
        labels:
          {{- toYaml $mergedLabels | nindent 10 }}
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: {{ required (printf "configs.%s.awsSecret.arn required" $configKey) .arn }}
        {{- with .versionId }}
        version: uuid/{{ . | toString }}
        {{- end }}
{{- end }}
{{- else if (kindIs "map" .secret) }}
{{ include "idp-app.renderConfigFromContent" (list $ $configKey $configSpec) }}
{{- else }}
{{- $_ := required (printf "configs.%s.content required (or set .fromSecret, .fromConfigMap, .fromFolder, .secret, .sealedSecret, .awsSecret)" $configKey) .content }}
{{ include "idp-app.renderConfigFromContent" (list $ $configKey $configSpec) }}
{{- end }}
{{- end }}
{{- if $secretStore }}
{{- $cluster := include "idp-app.clusterConfig" $ | fromYaml }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "idp-app.fullname" $ }}-config-secretsmanager
  labels:
    {{- $storeLabels := include "idp-app.labels" $ | fromYaml }}
    {{- toYaml $storeLabels | nindent 4 }}
  {{- $storeAnnotations := $defaultsConfigsAnnotations }}
  {{- with $storeAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $cluster.aws_region | required "$cluster.aws_region required" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "idp-app.serviceAccountName" $ }}
{{- end }}
{{- end }}
{{- end }}
